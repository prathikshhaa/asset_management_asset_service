spring:
  application:
    name: asset-service

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:assetdb}?createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:pass123}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8082}



eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0

security:
  jwt:
    enabled: ${JWT_ENABLED:true}
    secret: ${JWT_SECRET:8b7c4d2a9f1e6c3b5d8a7f2c9e1b4d6a8c5f7e9d2b1c6a4f}
  internal:
    api-key: ${INTERNAL_API_KEY:pass123}

logging:
  pattern:
    level: "%5p [%X{traceId:-},%X{spanId:-}]"
